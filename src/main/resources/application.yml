server:
  port: 9999
  servlet:
    context-path: /api

spring:
  application:
    name: veingraph-server
  # 启用虚拟线程 (Java 21 Virtual Threads)
  threads:
    virtual:
      enabled: true

  # ==================== MongoDB (业务库 + 数据湖) ====================
  data:
    mongodb:
      uri: mongodb://root:veingraph@localhost:27017/veingraph?authSource=admin
    # ==================== Redis ====================
    redis:
      host: localhost
      port: 6379
      password: veingraph
    # ==================== Elasticsearch (语义与防幻觉引擎) ====================
    elasticsearch:
      repositories:
        enabled: true

  elasticsearch:
    uris: http://localhost:9200

  # ==================== Kafka (异步解耦层) ====================
  kafka:
    bootstrap-servers: http://localhost:9092
    consumer:
      group-id: veingraph-extract-group
      auto-offset-reset: earliest
      # 限流: 每批最多拉取 5 条 Chunk
      max-poll-records: 5
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "com.veingraph.kafka"
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
  # ==================== Neo4j (关系大脑) ====================
  # 暂时禁用 Neo4j
  neo4j:
    uri: bolt://localhost:7687
    authentication:
      username: neo4j
      password: veingraph

  # ==================== Spring AI Alibaba (LLM 调用层) ====================
  ai:
    zhipuai:
      api-key: "d63972e7ab7b4fbaa43edc83ec7d1eb7.U2MTywqw3QpkMdvW"
      base-url: "https://open.bigmodel.cn/api/paas"
      chat:
        options:
          model: glm-4.6

# ==================== Actuator 健康检查 ====================
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always
veingraph:
  chunking:
    max-size: 5000
    max-overlap: 200
  rag:
    es-top-k: 5
  outbox:
    scan-interval: 10000
    batch-size: 100
  vector:
    scan-interval: 15000

# ==================== Knife4j API 文档 ====================
knife4j:
  enable: false
  setting:
    language: zh_cn
# ==================== 日志配置 ====================
logging:
  level:
    com.veingraph: DEBUG
    # org.springframework.data.neo4j: INFO
    org.springframework.data.mongodb: INFO
    org.springframework.kafka: INFO
