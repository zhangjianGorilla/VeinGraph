version: '3.8'

# 脉络 (VeinGraph) 本地开发环境 - Docker Compose
# 启动命令: docker compose up -d

services:

  # ==================== Redis (缓存 / Session) ====================
  redis:
    image: redis:7-alpine
    container_name: veingraph-redis
    ports:
      - "6379:6379"
    command: redis-server --requirepass veingraph
    volumes:
      - redis-data:/data
    restart: unless-stopped

  # ==================== MongoDB (业务库 + 数据湖) ====================
  mongodb:
    image: mongo:7
    container_name: veingraph-mongodb
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: root
      MONGO_INITDB_ROOT_PASSWORD: veingraph
      MONGO_INITDB_DATABASE: veingraph
    volumes:
      - mongo-data:/data/db
    restart: unless-stopped

  # ==================== Neo4j (关系大脑) ====================
  neo4j:
    image: neo4j:5-community
    container_name: veingraph-neo4j
    ports:
      - "7474:7474"   # Neo4j Browser HTTP
      - "7687:7687"   # Bolt 协议
    environment:
      NEO4J_AUTH: neo4j/veingraph
      NEO4J_PLUGINS: '["apoc"]'
    volumes:
      - neo4j-data:/data
    restart: unless-stopped

  # ==================== Elasticsearch (语义与防幻觉引擎) ====================
  elasticsearch:
    image: elasticsearch:8.17.0
    container_name: veingraph-elasticsearch
    ports:
      - "9200:9200"
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
    volumes:
      - es-data:/usr/share/elasticsearch/data
    restart: unless-stopped

  # ==================== MySQL (关系型数据库) ====================
  mysql:
    image: mysql:8
    container_name: veingraph-mysql
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: veingraph
      MYSQL_DATABASE: veingraph
      MYSQL_ROOT_HOST: '%'
      TZ: Asia/Shanghai
    volumes:
      - mysql-data:/var/lib/mysql
    restart: unless-stopped

  # ==================== Kafka + Zookeeper (异步消息总线) ====================
  zookeeper:
    image: confluentinc/cp-zookeeper:7.7.0
    container_name: veingraph-zookeeper
    ports:
      - "2181:2181"
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    restart: unless-stopped

  kafka:
    image: confluentinc/cp-kafka:7.7.0
    container_name: veingraph-kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    volumes:
      - kafka-data:/var/lib/kafka/data
    depends_on:
      - zookeeper
    restart: unless-stopped

  # ==================== Milvus 向量数据库 ====================
  etcd:
    image: quay.io/coreos/etcd:v3.5.18
    container_name: veingraph-etcd
    environment:
      ETCD_AUTO_COMPACTION_MODE: revision
      ETCD_AUTO_COMPACTION_RETENTION: "1000"
      ETCD_QUOTA_BACKEND_BYTES: "4294967296"
      ETCD_SNAPSHOT_COUNT: "50000"
    volumes:
      - etcd-data:/etcd
    command: etcd -advertise-client-urls=http://127.0.0.1:2379 -listen-client-urls http://0.0.0.0:2379 --data-dir /etcd
    restart: unless-stopped

  minio:
    image: minio/minio:RELEASE.2024-11-07T00-52-20Z
    container_name: veingraph-minio
    environment:
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
    volumes:
      - minio-data:/minio_data
    command: minio server /minio_data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3
    restart: unless-stopped

  milvus:
    image: milvusdb/milvus:v2.5.4
    container_name: veingraph-milvus
    ports:
      - "19530:19530"
      - "9091:9091"
    environment:
      ETCD_ENDPOINTS: etcd:2379
      MINIO_ADDRESS: minio:9000
    volumes:
      - milvus-data:/var/lib/milvus
    command: ["milvus", "run", "standalone"]
    depends_on:
      - etcd
      - minio
    restart: unless-stopped

volumes:
  redis-data:
  mongo-data:
  neo4j-data:
  es-data:
  mysql-data:
  kafka-data:
  etcd-data:
  minio-data:
  milvus-data:
