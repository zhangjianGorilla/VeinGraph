server:
  port: 9999
  servlet:
    context-path: /api

spring:
  application:
    name: veingraph-server
  # 启用虚拟线程 (Java 21 Virtual Threads)
  threads:
    virtual:
      enabled: true

  # ==================== Spring Security OAuth2 ====================
  security:
    oauth2:
      client:
        registration:
          github:
            client-id: ${GITHUB_CLIENT_ID:your-github-client-id}
            client-secret: ${GITHUB_CLIENT_SECRET:your-github-client-secret}
            scope: read:user,user:email
          gitee:
            client-id: ${GITEE_CLIENT_ID:your-gitee-client-id}
            client-secret: ${GITEE_CLIENT_SECRET:your-gitee-client-secret}
            authorization-grant-type: authorization_code
            redirect-uri: "{baseUrl}/login/oauth2/code/{registrationId}"
            scope: user_info
        provider:
          gitee:
            authorization-uri: https://gitee.com/oauth/authorize
            token-uri: https://gitee.com/oauth/token
            user-info-uri: https://gitee.com/api/v5/user
            user-name-attribute: login

  # ==================== MongoDB (业务库 + 数据湖) ====================
  data:
    mongodb:
      uri: mongodb://root:veingraph@localhost:27017/veingraph?authSource=admin
    # ==================== Redis ====================
    redis:
      host: localhost
      port: 6379
      password: veingraph
    # ==================== Elasticsearch (语义与防幻觉引擎) ====================
    elasticsearch:
      repositories:
        enabled: true

  elasticsearch:
    uris: http://localhost:9200

  # ==================== Kafka (异步解耦层) ====================
  kafka:
    bootstrap-servers: http://localhost:9092
    consumer:
      group-id: veingraph-extract-group
      auto-offset-reset: earliest
      # 限流: 每批最多拉取 5 条 Chunk
      max-poll-records: 5
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "com.veingraph.kafka"
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
  # ==================== Neo4j (关系大脑) ====================
  # 暂时禁用 Neo4j
  neo4j:
    uri: bolt://localhost:7687
    authentication:
      username: neo4j
      password: veingraph

  # ==================== Spring AI Alibaba (LLM 调用层) ====================
  ai:
    zhipuai:
      api-key: ${ZHIPUAI_API_KEY:YOUR_API_KEY_HERE}
      base-url: "https://open.bigmodel.cn/api/paas"
      chat:
        options:
          model: glm-4.6

# ==================== Actuator 健康检查 ====================
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always
veingraph:
  # ==================== 认证配置 ====================
  auth:
    enabled: true
    issuer: http://localhost:9999/api
    frontend-redirect-url: http://localhost:5173
    jwt:
      secret: ${JWT_SECRET:veingraph-default-secret-key-please-change-in-production}
      expiration: 86400000
    oauth2:
      client-id: ${OAUTH2_CLIENT_ID:veingraph-web}
      client-secret: ${OAUTH2_CLIENT_SECRET:veingraph-web-secret}
  chunking:
    max-size: 5000
    max-overlap: 200
  rag:
    es-top-k: 5
  outbox:
    scan-interval: 10000
    batch-size: 100
  vector:
    scan-interval: 15000

# ==================== Knife4j API 文档 ====================
knife4j:
  enable: true
  setting:
    language: zh_cn
    enable-debug: true
    enable-open-auth: true
# ==================== 日志配置 ====================
logging:
  level:
    com.veingraph: DEBUG
    # org.springframework.data.neo4j: INFO
    org.springframework.data.mongodb: INFO
    org.springframework.kafka: INFO
